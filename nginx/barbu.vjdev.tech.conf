# Conf nginx pour barbu.vjdev.tech
#
# Première installation :
#   1. sudo ln -s /var/www/vincent/react-barbu-v3/nginx/barbu.vjdev.tech.conf \
#                 /etc/nginx/sites-enabled/barbu.vjdev.tech
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo certbot --nginx -d barbu.vjdev.tech
#      certbot va modifier cette conf : il ajoute le bloc HTTPS, la redirection
#      80→443, et les directives ssl_certificate/ssl_certificate_key.
#
# Architecture :
#   - Frontend Vite (build statique) servi depuis dist/
#   - Backend Express + Socket.IO sur localhost:4003 (géré par PM2)

server {
    server_name barbu.vjdev.tech;

    # Frontend Vite (build statique)
    root /var/www/vincent/react-barbu-v3/dist;
    index index.html;

    # index.html jamais en cache (SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets hashés par Vite : cache long terme immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA — fallback vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST Express
    location /api {
        proxy_pass http://localhost:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (WebSocket + polling)
    location /socket.io/ {
        proxy_pass http://localhost:4003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    gzip on;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    access_log /var/log/nginx/barbu_access.log;
    error_log  /var/log/nginx/barbu_error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/barbu.vjdev.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/barbu.vjdev.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = barbu.vjdev.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name barbu.vjdev.tech;
    return 404; # managed by Certbot


}